name: Deploy to novahome

# Autodeploy on every push to main, plus a manual trigger. Builds run on the
# ISOLATED self-hosted runner inside the ci-runner KVM VM (label `novahome`,
# egress-filtered: GitHub + registries only, no LAN/host reach). The runner
# builds the release, then streams the built artifacts over a command-restricted
# ssh channel to the host-side deploy bridge (ci-deploy@10.111.0.1), which backs
# up the prod DB host-side and invokes the root-owned deploy.sh (swap +
# health-check :8083 + auto-rollback). The runner holds no host root and no DB
# credentials. See sysops ctx 019f1083 for the bridge design.
on:
  push:
    branches: [main]
    paths-ignore:        # docs-only pushes shouldn't rebuild/restart prod
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

# Serialize deploys; never interrupt one that is mid-swap.
concurrency:
  group: deploy-novahome
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, novahome]
    timeout-minutes: 45         # headroom for a cold target/ on the fresh VM
    steps:
      - name: Checkout the pushed commit
        uses: actions/checkout@v7

      - name: Build release
        run: |
          set -euo pipefail
          . "$HOME/.cargo/env"
          cargo leptos build --release            # build failure stops here: no deploy

      - name: Deploy via host bridge (DB backup + swap happen host-side)
        run: |
          set -euo pipefail
          tar -C target -czf - release/authlyn-interactive site \
            | ssh -i ~/.ssh/ci-deploy -o StrictHostKeyChecking=accept-new \
                ci-deploy@10.111.0.1 deploy-prod
