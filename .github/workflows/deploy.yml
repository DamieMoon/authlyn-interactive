name: Deploy to novahome

# Autodeploy on every push to main, plus a manual trigger. Runs on the
# self-hosted runner that lives ON novahome (the mendicant-bias prod host,
# x86_64). The runner checks out the pushed commit into its workspace (target/
# stays warm across runs), builds the release, backs up the prod DB, then calls
# the root-owned deploy bridge — no SSH keys or stored secrets are involved.
#
# Requires a self-hosted runner registered on novahome with the `novahome`
# label, running as user `damien` (so ~/.cargo is on PATH and the scoped
# NOPASSWD sudoers entry for /opt/authlyn-prod/deploy.sh applies). See
# .claude/commands/deploy.md for the one-time runner-registration runbook.
on:
  push:
    branches: [main]
    paths-ignore:        # docs-only pushes shouldn't rebuild/restart prod
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

# Serialize deploys; never interrupt one that is mid-swap.
concurrency:
  group: deploy-novahome
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, novahome]
    timeout-minutes: 30         # x86_64 Ryzen builds are fast; headroom for a cold target/
    steps:
      - name: Checkout the pushed commit
        uses: actions/checkout@v4

      - name: Build release
        run: |
          set -euo pipefail
          . "$HOME/.cargo/env"
          cargo leptos build --release            # build failure stops here: no backup, no deploy

      - name: Backup prod DB before deploy
        run: |
          set -euo pipefail
          ts=$(date -u +%Y%m%dT%H%M%SZ)
          dir=/data/prod_backups
          mkdir -p "$dir"
          tmp="$dir/prod_backup_${ts}.surql"
          surreal export --endpoint http://127.0.0.1:8000 \
            --user root --pass root --ns authlyn --db prod "$tmp"
          test -s "$tmp" || { echo "::error::prod DB backup is empty — aborting deploy"; exit 1; }
          gzip -f "$tmp"
          echo "backup: ${tmp}.gz ($(du -h "${tmp}.gz" | cut -f1))"
          ls -1t "$dir"/prod_backup_*.surql.gz | tail -n +16 | xargs -r rm -f   # keep newest 15

      - name: Deploy (scoped sudo bridge — health-check + auto-rollback)
        run: sudo -n /opt/authlyn-prod/deploy.sh "$GITHUB_WORKSPACE"
