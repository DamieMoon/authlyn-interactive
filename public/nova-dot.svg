<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
	<!-- Static body — a layered civic-AI iris in the inherited accent
	     (currentColor; .nova-orb sets the hue). Concentric discs read as a
	     sentinel "eye"; the offset white speck is the catchlight. -->
	<circle cx="20" cy="20" r="15.5" fill="currentColor" opacity="0.10"/>
	<circle cx="20" cy="20" r="10" fill="currentColor" opacity="0.20"/>
	<circle cx="20" cy="20" r="5.2" fill="currentColor"/>
	<circle cx="17.3" cy="17.3" r="1.5" fill="#ffffff" opacity="0.7"/>
	<!-- Animatable ring — a DISTINCT element so CSS (fx-nova-ring, _motion.scss)
	     can spin it without touching the body. Resting transform is identity, so
	     under prefers-reduced-motion it sits as a static dashed halo. -->
	<circle class="nova-orb-ring" cx="20" cy="20" r="15.5" fill="none"
		stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
		stroke-dasharray="5 7 1.5 9" opacity="0.85"/>
</svg>
